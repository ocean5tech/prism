[tool:pytest]
# Pytest Configuration
minversion = 7.0
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=backend
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=term-missing
    --cov-branch
    --cov-fail-under=90
    --junitxml=junit.xml
    --maxfail=5
    --durations=10

# Test markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for service communication  
    performance: Performance and load tests
    security: Security and authentication tests
    e2e: End-to-end system tests
    slow: Tests that take longer than 5 seconds
    requires_external: Tests requiring external services
    adversarial: Adversarial system testing
    domain_finance: Finance domain specific tests
    domain_sports: Sports domain specific tests  
    domain_technology: Technology domain specific tests
    workflow: n8n workflow tests
    data_quality: Data pipeline and ETL tests

# Async test configuration
asyncio_mode = auto

# Test discovery patterns
collect_ignore = [
    "setup.py",
    "conftest.py"
]

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning