# NGINX API Gateway Configuration for Prism Microservices

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for" '
                   'rt=$request_time uct="$upstream_connect_time" '
                   'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/m;

    # Upstream Services
    upstream content_generation_service {
        least_conn;
        server content-generation-service:8000 max_fails=3 fail_timeout=30s;
    }

    upstream detection_service {
        least_conn;
        server detection-service:8001 max_fails=3 fail_timeout=30s;
    }

    upstream publishing_service {
        least_conn;
        server publishing-service:8002 max_fails=3 fail_timeout=30s;
    }

    upstream configuration_service {
        least_conn;
        server configuration-service:8003 max_fails=3 fail_timeout=30s;
    }

    upstream user_management_service {
        least_conn;
        server user-management-service:8004 max_fails=3 fail_timeout=30s;
    }

    upstream analytics_service {
        least_conn;
        server analytics-service:8005 max_fails=3 fail_timeout=30s;
    }

    upstream file_storage_service {
        least_conn;
        server file-storage-service:8006 max_fails=3 fail_timeout=30s;
    }

    upstream external_api_service {
        least_conn;
        server external-api-service:8007 max_fails=3 fail_timeout=30s;
    }

    # Main Server Block
    server {
        listen 80;
        server_name api.prism.com localhost;

        # Security Headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # CORS Headers
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "$http_origin";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }

        # Health Check Endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Content Generation Service Routes
        location /api/v1/content/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://content_generation_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /api/v1/templates/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://content_generation_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Detection Service Routes
        location /api/v1/quality/ {
            limit_req zone=api burst=15 nodelay;
            proxy_pass http://detection_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 45s;
            proxy_read_timeout 45s;
        }

        # Publishing Service Routes
        location /api/v1/publishing/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://publishing_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Configuration Service Routes
        location /api/v1/config/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://configuration_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/domains/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://configuration_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # User Management Service Routes
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://user_management_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/users/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://user_management_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Analytics Service Routes
        location /api/v1/analytics/ {
            limit_req zone=api burst=15 nodelay;
            proxy_pass http://analytics_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # File Storage Service Routes
        location /api/v1/files/ {
            limit_req zone=api burst=20 nodelay;
            client_max_body_size 50M;
            proxy_pass http://file_storage_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # External API Service Routes
        location /api/v1/external/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://external_api_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/webhooks/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://external_api_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Service Health Checks (Internal)
        location ~* ^/internal/([^/]+)/health$ {
            internal;
            set $service $1;
            
            if ($service = "content") {
                proxy_pass http://content_generation_service/health;
            }
            if ($service = "detection") {
                proxy_pass http://detection_service/health;
            }
            if ($service = "publishing") {
                proxy_pass http://publishing_service/health;
            }
            if ($service = "config") {
                proxy_pass http://configuration_service/health;
            }
            if ($service = "users") {
                proxy_pass http://user_management_service/health;
            }
            if ($service = "analytics") {
                proxy_pass http://analytics_service/health;
            }
            if ($service = "files") {
                proxy_pass http://file_storage_service/health;
            }
            if ($service = "external") {
                proxy_pass http://external_api_service/health;
            }
            
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # Static Files and Documentation
        location /docs {
            return 302 /docs/;
        }

        location /docs/ {
            proxy_pass http://content_generation_service/docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default route
        location / {
            return 404 '{"error": "Not Found", "message": "API endpoint not found"}';
            add_header Content-Type application/json;
        }
    }

    # HTTPS Server Block (for production)
    server {
        listen 443 ssl http2;
        server_name api.prism.com;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # Modern configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000" always;

        # Include the same location blocks as HTTP server
        include /etc/nginx/conf.d/api-locations.conf;
    }
}

# TCP/UDP proxy for direct service access (development only)
stream {
    upstream postgres_backend {
        server postgres:5432;
    }

    upstream redis_backend {
        server redis:6379;
    }

    server {
        listen 15432;
        proxy_pass postgres_backend;
    }

    server {
        listen 16379;
        proxy_pass redis_backend;
    }
}